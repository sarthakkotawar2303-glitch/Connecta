  <!-- Outer Circles -->
  <circle cx="50" cy="22" r="8" fill="#007AFF" stroke="#FFFFFF" stroke-width="6" />
  <circle cx="77" cy="40.5" r="8" fill="#007AFF" stroke="#FFFFFF" stroke-width="6" />
  <circle cx="67" cy="72.5" r="8" fill="#007AFF" stroke="#FFFFFF" stroke-width="6" />
  <circle cx="33" cy="72.5" r="8" fill="#007AFF" stroke="#FFFFFF" stroke-width="6" />
